# =============================================================================
# Forge — Docker Compose (local development / single-node deployment)
# =============================================================================
#
# Usage:
#   docker compose up -d              # Start forge daemon
#   docker compose --profile monitor up -d  # Start with Prometheus + Grafana
#   docker compose logs -f forge      # Follow logs
#   docker compose down               # Stop all services
#
# =============================================================================

services:
  forge:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: forge-daemon
    ports:
      - "8420:8420"
    volumes:
      - forge-data:/var/lib/forge
    environment:
      - FORGE_HTTP_ENABLED=true
      - FORGE_HTTP_BIND=0.0.0.0
      - FORGE_HTTP_PORT=8420
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8420/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: Monitoring stack (enable with --profile monitor)
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: forge-prometheus
    profiles: ["monitor"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      forge:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: forge-grafana
    profiles: ["monitor"]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=forge
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  forge-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

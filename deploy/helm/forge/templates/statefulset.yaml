apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "forge.fullname" . }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "forge.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "forge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "forge.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "forge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.backup.enabled }}
      initContainers:
        - name: litestream-restore
          image: {{ .Values.backup.litestream.image }}
          args:
            - restore
            - -if-db-not-exists
            - -config
            - /etc/litestream.yml
            - /var/lib/forge/forge.db
          volumeMounts:
            - name: data
              mountPath: /var/lib/forge
            - name: config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
              readOnly: true
          {{- if .Values.backup.s3.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backup.s3.existingSecret }}
          {{- end }}
      {{- end }}
      containers:
        - name: forge-daemon
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.http.port }}
              protocol: TCP
          env:
            - name: FORGE_DB
              value: /var/lib/forge/forge.db
            - name: FORGE_SOCKET
              value: /var/lib/forge/forge.sock
            - name: FORGE_HTTP_ENABLED
              value: "true"
            - name: FORGE_HTTP_BIND
              value: {{ .Values.http.bind | quote }}
            - name: FORGE_HTTP_PORT
              value: {{ .Values.http.port | quote }}
            {{- if .Values.auth.enabled }}
            - name: FORGE_AUTH_ENABLED
              value: "true"
            - name: FORGE_AUTH_ISSUER_URL
              value: {{ .Values.auth.issuerUrl | quote }}
            - name: FORGE_AUTH_AUDIENCE
              value: {{ .Values.auth.audience | quote }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: FORGE_METRICS_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.otlp.enabled }}
            - name: FORGE_OTLP_ENABLED
              value: "true"
            - name: FORGE_OTLP_ENDPOINT
              value: {{ .Values.otlp.endpoint | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/forge
            - name: config
              mountPath: /etc/forge/config.toml
              subPath: config.toml
              readOnly: true
            - name: tmp
              mountPath: /tmp
        {{- if .Values.backup.enabled }}
        - name: litestream-replicate
          image: {{ .Values.backup.litestream.image }}
          args:
            - replicate
            - -config
            - /etc/litestream.yml
          volumeMounts:
            - name: data
              mountPath: /var/lib/forge
            - name: config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
              readOnly: true
          {{- if .Values.backup.s3.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backup.s3.existingSecret }}
          {{- end }}
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "forge.fullname" . }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}

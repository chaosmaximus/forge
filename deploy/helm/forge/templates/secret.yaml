{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forge.fullname" . }}-auth
  labels:
    {{- include "forge.labels" . | nindent 4 }}
type: Opaque
data: {}
  # Auth credentials are expected to be provided via existingSecret or
  # injected through a secrets operator (e.g. External Secrets, Sealed Secrets).
  # This template exists as a placeholder — no hardcoded credentials.
{{- end }}
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forge.fullname" . }}-backup
  labels:
    {{- include "forge.labels" . | nindent 4 }}
type: Opaque
data: {}
  # Backup credentials (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) should be
  # provided via backup.s3.existingSecret or a secrets operator.
  # This template exists as a placeholder — no hardcoded credentials.
{{- end }}

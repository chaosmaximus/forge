apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "forge.fullname" . }}
  labels:
    {{- include "forge.labels" . | nindent 4 }}
data:
  config.toml: |
    # Forge daemon configuration (generated by Helm)
    [http]
    enabled = true
    bind = {{ .Values.http.bind | quote }}
    port = {{ .Values.http.port }}

    {{- if .Values.auth.enabled }}

    [auth]
    enabled = true
    issuer_url = {{ .Values.auth.issuerUrl | quote }}
    audience = {{ .Values.auth.audience | quote }}
    admin_emails = [{{ range $i, $e := .Values.auth.adminEmails }}{{ if $i }}, {{ end }}{{ $e | quote }}{{ end }}]
    {{- end }}

    {{- if .Values.metrics.enabled }}

    [metrics]
    enabled = true
    {{- end }}

    {{- if .Values.otlp.enabled }}

    [otlp]
    enabled = true
    endpoint = {{ .Values.otlp.endpoint | quote }}
    {{- end }}
  {{- if .Values.backup.enabled }}
  litestream.yml: |
    dbs:
      - path: /var/lib/forge/forge.db
        replicas:
          - type: s3
            bucket: {{ .Values.backup.s3.bucket | quote }}
            path: {{ .Values.backup.s3.path | quote }}
            region: {{ .Values.backup.s3.region | quote }}
  {{- end }}

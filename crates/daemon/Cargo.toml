[package]
name = "forge-daemon"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "forge-daemon"
path = "src/main.rs"

[dependencies]
forge-v2-core = { path = "../core" }
rusqlite = { version = "0.32", features = ["bundled"] }
hnsw_rs = "0.3"
petgraph = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "io-util", "signal", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"

[dev-dependencies]
tempfile = "3"

# SPDX sidecar manifest — Phase 2P-1b §3.
#
# JSON files can't carry inline SPDX-License-Identifier comments without
# breaking schema-validated parsers, so this YAML sidecar is the canonical
# license declaration for every shipped JSON file in the public surface.
#
# License of record for the entire public Forge repo: Apache-2.0 (see
# /LICENSE, /NOTICE). This sidecar makes the declaration machine-readable
# for marketplace tooling, downstream packagers, and CI validation
# (scripts/check-license-manifest.sh).
#
# All `path` entries are relative to the repo root (not to this manifest's
# directory). Coverage_paths lists directories whose *.json files MUST
# appear in files[]; the validator walks each path recursively.

schema_version: 1
package: forge
license: Apache-2.0

coverage_paths:
  - .claude-plugin
  - hooks

files:
  - path: .claude-plugin/plugin.json
    license: Apache-2.0
  - path: .claude-plugin/marketplace.json
    license: Apache-2.0
  - path: hooks/hooks.json
    license: Apache-2.0

references:
  - LICENSE
  - NOTICE

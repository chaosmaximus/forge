name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # MUST run first: when the .github/pending-rollback flag exists,
      # master is in a rollback freeze and ALL CI signal should
      # short-circuit to one obvious error. Closes W5 review G1 (the
      # original placement at the end of the job let unrelated checks
      # mask the rollback signal — fixed in W6 review MED-2).
      - name: Pending-rollback flag guard
        run: |
          if [ -f .github/pending-rollback ]; then
            echo "::error::.github/pending-rollback flag is set — master is in rollback freeze. Remove the flag once the rollback is complete (see docs/operations/2P-1-rollback.md Step 5)."
            echo "::notice::If you committed .github/pending-rollback unintentionally, run \`git rm .github/pending-rollback\` and re-push."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy (0 warnings required)
        run: cargo clippy -p forge-daemon -p forge-core -p forge-cli -p forge-hud -- -W clippy::all -D warnings

      - name: Span integrity + tokio::spawn whitelist (2A-4d.1 T7)
        run: bash scripts/ci/check_spans.sh

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run daemon tests
        run: cargo test -p forge-daemon --lib

      - name: Run core tests
        run: cargo test -p forge-core

      - name: Run cli tests
        run: cargo test -p forge-cli

      - name: Run hud tests
        run: cargo test -p forge-hud

  plugin-surface:
    name: Plugin surface (schema + shellcheck + skills + agents)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Validate plugin.json
        run: bash tests/static/validate-plugin.sh

      - name: Validate hooks.json
        run: bash tests/static/validate-hooks.sh

      - name: Validate skills (frontmatter + description + structure)
        run: bash tests/static/validate-skills.sh

      - name: Validate agents (frontmatter + tools)
        run: bash tests/static/validate-agents.sh

      - name: Validate agent-tools (CLI-first, no MCP refs)
        run: bash tests/static/validate-agent-tools.sh

      - name: Shellcheck hooks + migration scripts
        run: bash tests/static/run-shellcheck.sh

      - name: Scrub fixture tests
        run: bash tests/scripts/test-migrate-scrub.sh

      # Fixture tests run BEFORE the real-repo drift check so a parser
      # regression can't mask its own broken self-test (W1 review L2).
      - name: Harness sync fixture tests
        run: bash tests/scripts/test-harness-sync.sh

      - name: Harness drift (auto-flips to fail-closed on 2026-05-09)
        # Script self-determines mode from $AMNESTY_END_DATE — no env var needed.
        # Override via FORGE_HARNESS_SYNC_ENFORCE if early-flip is desired.
        run: bash scripts/check-harness-sync.sh

      # Phase 2P-1b §2: every adversarial review of a wave/phase lands as a
      # YAML in docs/superpowers/reviews/. Validates schema + closes-open
      # blocker invariant. Fixture tests run first to guard the validator
      # itself from parser regressions (mirrors harness-sync ordering).
      - name: Review artifacts fixture tests
        run: bash tests/scripts/test-review-artifacts.sh

      - name: Review artifacts validation
        run: bash scripts/check-review-artifacts.sh

      # Phase 2P-1b §3: SPDX sidecar manifest at .claude-plugin/LICENSES.yaml
      # declares licenses for every shipped JSON file (which can't carry
      # inline SPDX-License-Identifier comments without breaking schema-
      # validated parsers). Fixture tests precede the real-repo run.
      - name: License manifest fixture tests
        run: bash tests/scripts/test-license-manifest.sh

      - name: License manifest validation
        run: bash scripts/check-license-manifest.sh

      # Phase 2P-1b §7 — 2A-4d interlock. Any PR that touches
      # crates/core/src/protocol/request.rs MUST also bump plugin.json's
      # protocol_hash via `bash scripts/sync-protocol-hash.sh`. Catches
      # the dropped-bump scenario where harness-sync drift accumulates
      # silently because nobody propagated a Request enum change to the
      # plugin manifest.
      - name: Protocol-hash interlock fixture tests
        run: bash tests/scripts/test-protocol-hash.sh

      - name: Protocol-hash interlock validation
        run: bash scripts/check-protocol-hash.sh

  bench-fast:
    # Phase 2A-4d.3 T13: per-commit fast benches (forge-consolidation,
    # forge-identity). In-process harnesses run in <1s on ubuntu-latest
    # (T1 measured 0.416s for forge-consolidation seed=42), so the job
    # fits comfortably in CI budget. ORT download is the dominant cost
    # (~30s cold, ~1s warm via actions/cache).
    #
    # Rollout policy (D4): continue-on-error: true for the first 14 days
    # post-merge while telemetry calibrates; T17 promotes to required
    # after 14 consecutive green master runs.
    name: Bench-fast (${{ matrix.bench }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        bench: [forge-consolidation, forge-identity]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: .tools
          key: ${{ runner.os }}-ort-${{ hashFiles('scripts/setup-dev-env.sh') }}

      - name: Setup dev env (downloads ORT to .tools/ on cold cache)
        run: bash scripts/setup-dev-env.sh

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Build forge-bench (release, bench feature)
        run: cargo build --release --bin forge-bench --features bench

      - name: Run ${{ matrix.bench }}
        env:
          FORGE_DIR: ${{ runner.temp }}/forge-ci
          FORGE_HARDWARE_PROFILE: ubuntu-latest-ci
        run: |
          mkdir -p "$RUNNER_TEMP/bench-results/${{ matrix.bench }}"
          ./target/release/forge-bench ${{ matrix.bench }} \
            --seed 42 \
            --output "$RUNNER_TEMP/bench-results/${{ matrix.bench }}"

      - name: Upload bench results (summary.json only — no forge.db)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.bench }}-${{ github.sha }}
          path: ${{ runner.temp }}/bench-results/${{ matrix.bench }}/
          retention-days: 14
          compression-level: 9

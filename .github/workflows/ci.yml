name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy (0 warnings required)
        run: cargo clippy -p forge-daemon -p forge-core -p forge-cli -p forge-hud -- -W clippy::all -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run daemon tests
        run: cargo test -p forge-daemon --lib

      - name: Run core tests
        run: cargo test -p forge-core

      - name: Run cli tests
        run: cargo test -p forge-cli

      - name: Run hud tests
        run: cargo test -p forge-hud

  plugin-surface:
    name: Plugin surface (schema + shellcheck + skills + agents)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Validate plugin.json
        run: bash tests/static/validate-plugin.sh

      - name: Validate hooks.json
        run: bash tests/static/validate-hooks.sh

      - name: Validate skills (frontmatter + description + structure)
        run: bash tests/static/validate-skills.sh

      - name: Validate agents (frontmatter + tools)
        run: bash tests/static/validate-agents.sh

      - name: Validate agent-tools (CLI-first, no MCP refs)
        run: bash tests/static/validate-agent-tools.sh

      - name: Shellcheck hooks + migration scripts
        run: bash tests/static/run-shellcheck.sh

      - name: Scrub fixture tests
        run: bash tests/scripts/test-migrate-scrub.sh

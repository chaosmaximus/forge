  # ── NEW issues introduced or surfaced by v2 ──────────────────────
  - id: N1
    severity: HIGH
    summary: >
      D6 max_possible math is wrong. §3.3 sets `max_possible = (N-1) × 30 = 120`,
      but compile_dynamic_suffix renders at most `decisions_limit (10) +
      lessons_limit (5) = 15` rows per project (config.rs:500-501;
      recall.rs:1008 `LIMIT {decisions_limit}` + L1101 `LIMIT
      {lessons_limit}`). Worse, the SQL filter
      `(project = ?1 OR project IS NULL OR project = '')` blocks ALL
      foreign-project rows at the SQL layer — under correct behavior
      foreign_tokens always equals 0 and D6 trivially scores 1.0. The
      denominator only matters when a regression breaks the WHERE
      clause; with `max_possible = 120`, a 5-row leak scores
      `1 - 5/120 = 0.958` which PASSES the 0.95 min — D6 is blind to
      small leaks. Recommend `max_possible = decisions_limit +
      lessons_limit = 15` (then 1-row leak → 0.933, BELOW min, CAUGHT)
      OR override ContextConfig in the bench to push limits to 30 each
      so all rows can render → max_possible = 60 per project.
    file: docs/superpowers/specs/2026-04-25-domain-isolation-bench-design.md
    line: 184
    status: resolved
    fixed_by: 728cebb
    rationale: >
      Spec lock-time fix; D6 is the highest-weighted dim alongside D1
      and currently has near-zero leakage signal.
  - id: N2
    severity: MEDIUM
    summary: >
      D6 partial-coverage disclaimer fragmented across 3 spots
      (§3.1 D6 row note, §4 D10, §5 third bullet). A future reviewer
      could miss that a leakage bug in `list_entities` (recall.rs:1291)
      or `list_unconsumed_perceptions` (recall.rs:1417) is invisible
      to v1. Recommend single consolidated coverage table in §5
      enumerating each compile_context-invoked helper and v1
      coverage status (covered / not-covered / partial).
    file: docs/superpowers/specs/2026-04-25-domain-isolation-bench-design.md
    line: 282
    status: resolved
    fixed_by: 728cebb
    rationale: >
      Documentation hygiene; the gap is real and easily forgotten.
  - id: N3
    severity: MEDIUM
    summary: >
      D6 invocation under-specifies config dependency. `compile_context`
      at recall.rs:2048 calls `crate::config::load_config()` which in a
      bench `:memory:` context returns `Default::default()`. Currently
      `inj.session_context = true` so decisions + lessons render — but
      a future default flip turns it off and the section_disabled branch
      at L999-1000 emits empty `<decisions/>` + `<lessons/>`,
      `foreign_tokens = 0`, D6 = 1.0 trivially regardless of leakage.
      Fix: bench should call `compile_dynamic_suffix_with_inj`
      (recall.rs:876) directly with a pinned
      `ContextInjectionConfig { session_context: true, .. }`. Or add
      infra assertion #9 verifying compile_context output contains
      non-empty `<decisions>` + `<lessons>` blocks before D6 runs.
    file: docs/superpowers/specs/2026-04-25-domain-isolation-bench-design.md
    line: 206
    status: resolved
    fixed_by: 728cebb
    rationale: >
      Brittleness against future config defaults; cheap fix.
  - id: N4
    severity: MEDIUM
    summary: >
      D5 probe 4 SQL-injection assertion is weak. §3.1a probe 4 asserts
      "memory table row count post-call equals pre-call count" — catches
      DROP TABLE / DELETE FROM, MISSES mutation-style injection like
      `UPDATE memory SET project = 'attacker'` (preserves row count,
      corrupts scoping). Bind params verified at db/ops.rs:726, 729 →
      injection structurally impossible TODAY, but the bench is a
      regression detector for FUTURE code that might switch to
      string-interp. Add a sentinel-row hash check: hash
      `(title, content, project, tags)` of one canary row pre-call,
      assert equal post-call.
    file: docs/superpowers/specs/2026-04-25-domain-isolation-bench-design.md
    line: 109
    status: resolved
    fixed_by: 728cebb
    rationale: >
      Tightens the probe to catch mutation-class regressions cheaply.
  - id: N5
    severity: LOW
    summary: >
      Composite weighting calibration documentation. Walked scenarios:
      D2=0.85 (exact min) others perfect → composite 0.9775 (PASS);
      D1=D6=0.95 (exact mins) others perfect → 0.975 (PASS);
      D1=D6=0.85 (BELOW min) others perfect → 0.925 (FAIL composite +
      FAIL per-dim). Math sound and dual gate load-bearing for D1+D6.
      But D2/D3/D4 at 0.15/0.10/0.10 means a D2 collapse to 0.0 still
      allows composite ≥ 0.85 (others perfect); ≥0.95 composite gate
      catches it but only just. Spec §4 D4 should ship a calibration
      table walking these cases for reviewer-aid.
    file: docs/superpowers/specs/2026-04-25-domain-isolation-bench-design.md
    line: 263
    status: deferred
    rationale: >
      Documentation; no behavior change.
  - id: N6
    severity: LOW
    summary: >
      Confidence formula uses f32 → widens to f64 lossily. `0.7 +
      (idx as f32 * 0.01).clamp(0.0, 0.29)` → `0.70_f32` is
      `0.69999998807907104...` when widened. Determinism preserved
      per-run but ORDER BY tie-breaking on close BM25 scores could
      shift across compiler versions. Recommend `0.7_f64 +
      (idx as f64 * 0.01).clamp(0.0, 0.29)` for cleanness.
    file: docs/superpowers/specs/2026-04-25-domain-isolation-bench-design.md
    line: 131
    status: deferred
    rationale: >
      Determinism robustness across compiler upgrades.

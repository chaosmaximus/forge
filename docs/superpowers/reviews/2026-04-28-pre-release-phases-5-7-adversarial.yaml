findings:
  - id: HIGH-1
    severity: HIGH
    summary: SKIP_CLI_TOKENS expanded to mask plausible fictional surfaces (`plugin`/`plugins`/`skill`/`skills`/`memory`/`memories`/`context`/`contexts`/`session`)
    file: scripts/check-harness-sync.sh
    status: resolved
    fixed_by: pending
  - id: LOW-1
    severity: LOW
    summary: Suffixed-form regex captures only the first positional token (`forge-next sync push` would extract `sync`); no current harness file triggers it
    file: scripts/check-harness-sync.sh
    status: deferred
    rationale: |
      No current skill/agent/hook line uses multi-token positional
      arguments after `forge-next`/`forge-cli`. Documented as known
      limitation in the script's comment block; revisit when a real
      command needs multi-token capture (currently sync uses
      `sync-pull`/`sync-push` as separate subcommands, observe uses
      `--shape <name>`, etc.). Fix would tighten the awk extraction
      to walk all positional tokens, but adds complexity without
      current benefit.
  - id: LOW-2
    severity: LOW
    summary: After-period blind spot (`...forge plan ahead` is exempted by the `.` in the negative-class anchor); the `pkg.forge` exemption is the design intent
    file: scripts/check-harness-sync.sh
    status: deferred
    rationale: |
      The `.` in the negative-class anchor is load-bearing â€” it
      prevents `pkg.forge`, `crate.forge`, dotted-path matches. The
      cost is that a sentence-final `.` followed by `forge` is also
      exempted. Bare-form is a defense-in-depth layer; the
      suffixed-form regex (`\bforge-(next|cli)\s+...`) still catches
      drift even when prose punctuation defeats the bare check.
      Documented as known limitation in the script's comment block.

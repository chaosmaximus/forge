  # ── HIGH ──────────────────────────────────────────────────────────────
  - id: HIGH-1
    severity: HIGH
    summary: "W27 SessionMessageRead has no `to_session` scoping — any caller can read any message by ID/prefix; defense-in-depth regression vs SessionMessages"
    file: crates/daemon/src/sessions.rs:541
    status: deferred
    rationale: "The prior `forge-next message-read` flow indirectly went through `Request::SessionMessages { session_id }` which the daemon scopes by `to_session = ?1` (sessions.rs:491). Even though the empty session_id practically returned zero rows, the architectural contract was 'a caller can only see messages addressed to its session'. The new `read_message_by_id_or_prefix(conn, id_or_prefix)` does NOT scope by `to_session` or `from_session` at all — the SQL is `WHERE id = ?1` (exact) and `WHERE id LIKE ?1 || '%'` (prefix), unscoped. Combined with the public `messages` listing displaying 8-char ID prefixes, any caller that can reach the Unix socket can now look up the full body of messages addressed to any other session. The daemon is single-tenant on a Unix socket today (so this is not a hard auth boundary), but the W27 change strictly weakens the in-process isolation that previously existed. **Deferred to W28** because (a) single-tenant model means no auth hop is crossed, and (b) the fix is straightforward — add an optional `caller_session: Option<String>` to `Request::SessionMessageRead` and, when set, scope the SQL to `(to_session = ?2 OR from_session = ?2)`. Default open is acceptable for backward compat, but the field gives future RBAC a hook. As written, F12+F14 was 'find a message by ID' but the implementation became 'read any message anywhere' — the broader privilege wasn't called out in the commit body or plan-doc."
  # ── MEDIUM ────────────────────────────────────────────────────────────
  - id: MED-1
    severity: MEDIUM
    summary: "W26 partial-spawn rollback left orphaned `team_member` rows in pre-existing teams (no foreign-key cascade, no explicit DELETE)"
    file: crates/daemon/src/teams.rs:611
    status: resolved
    fixed_by: 118f0db
    rationale: "Resolved in W28 fix-wave (`118f0db`): the rollback arm in `crate::teams::run_team` now `DELETE`s the `team_member` rows for every session_id in the partial set, scoped to the team_id resolved from `team_name`. Correct on both paths: pre-existing teams keep prior member rows untouched (only in-flight ones are cleaned), freshly-created teams clean everything because the team-row DELETE follows. Original concern: schema check showed `team_member` had `PRIMARY KEY (team_id, user_id)` and NO foreign key referencing `team(id)`; the daemon does not run `PRAGMA foreign_keys = ON`; `list_team_members` does NOT filter by session.status — so every partial-failure run inflated the visible-member count of the pre-existing team by the number of agents that successfully spawned before the failure."
  - id: MED-2
    severity: MEDIUM
    summary: "W25 F1 stale-version detection compares CARGO_PKG_VERSION strings only — misses the common dev workflow where commits diverge but Cargo.toml is stable"
    file: crates/cli/src/commands/system.rs:58
    status: resolved
    fixed_by: 420c6e2
    rationale: "Resolved earlier than W1.32 by Wave Z Z11 (`420c6e2 feat(P3-4 Wave Z Z10+Z11): doctor backup hygiene + git_sha drift warnings`). `commands::system::doctor` now compares `option_env!(\"FORGE_GIT_SHA\")` against the daemon's reported `git_sha` and emits the stale-daemon hint when they diverge even with matching `CARGO_PKG_VERSION` strings. The doctor command was further refactored by W1.32 (W28 NIT-2): the stale hint is now rendered as a Health Checks entry instead of inline-on-Version so 80-char terminals stay clean."
  # ── LOW ───────────────────────────────────────────────────────────────
  - id: LOW-1
    severity: LOW
    summary: "W27 had no .trim() on CLI message-read input — trailing-space copy-paste silently failed both exact and prefix match"
    file: crates/cli/src/commands/system.rs:984
    status: resolved
    fixed_by: 118f0db
    rationale: "Resolved in W28 fix-wave (`118f0db`): `commands::system::message_read` now calls `id.trim().to_string()` at the entry, before constructing `Request::SessionMessageRead`. CLI-side trim is the user-facing surface and avoids requiring every future caller to trim. Original concern: terminal selection commonly captures a trailing space, so `id = '01ABC...Z '` failed exact match (`WHERE id = ?1`) AND prefix match (`WHERE id LIKE ?1 || '%'`) since no real id ends with a literal space; user saw `message not found: 01ABC...Z ` with the offending space invisible in monospaced rendering."
  - id: LOW-2
    severity: LOW
    summary: "W27 LIKE wildcard literalness — `%` and `_` in input are interpreted as SQL wildcards (no ESCAPE clause)"
    file: crates/daemon/src/sessions.rs:575
    status: resolved
    fixed_by: P3-4-W1.32
    rationale: "Resolved by P3-4 W1.32 via the option-(b) Crockford base32 boundary check. `read_message_by_id_or_prefix` now rejects any input containing characters outside `0-9A-HJKMNP-TV-Z` (case-insensitive) before the LIKE clause sees it; `%`, `_`, whitespace, and any non-base32 char return `MessageReadError::InvalidChars`. `w1_32_w28_low2_read_message_rejects_like_wildcards_at_boundary` pins each rejection branch."
  - id: LOW-3
    severity: LOW
    summary: "W27 ambiguity error wrapped as InvalidParameterName + handler prefix `session_message_read failed:` muddies the user-facing hint"
    file: crates/daemon/src/server/handler.rs:4249
    status: resolved
    fixed_by: P3-4-W1.32
    rationale: "Resolved by P3-4 W1.32 via the suggested `MessageReadError` enum (`InvalidChars`, `Ambiguous`, `Sql`). The handler arm now matches each variant and emits clean user-facing messages: ambiguous prefix renders as `error: ambiguous message ID prefix '01ABC' — type more characters (matches at least 2 rows)` with no `session_message_read failed:` prefix. The `Sql` variant retains the legacy prefix because that path is genuinely an internal failure."
  - id: LOW-4
    severity: LOW

findings:
  - id: LOW-1
    severity: LOW
    summary: F-MED-11 freeze-on-zero only wired for embedder; 7 other workers cannot flip ForgeWorkerDown
    file: crates/daemon/src/workers/mod.rs
    status: deferred
    rationale: |
      The freeze-on-zero plumbing in `refresh_gauges_impl` is correct and
      the embedder shutdown path now sets `forge_worker_healthy{worker="embedder"} = 0`
      so the `ForgeWorkerDown` alert can fire for the embedder. The other
      7 workers (watcher / extractor / consolidator / indexer / perception
      / disposition / diagnostics) never call `set_worker_unhealthy` and
      so their `ForgeWorkerDown` alert remains effectively un-triggerable.
      Commit body explicitly calls this out as "minimum viable wiring as
      of Phase 10E … full propagation is Phase 10E follow-up." The audit's
      specific case (alert can NEVER fire) is closed; expanding to all
      workers is queued for a fix-wave / Phase 10E.fw1 / v0.6.1.
  - id: LOW-2
    severity: LOW
    summary: A-009 dual-write match arm has no regression test pinning both `reality.*` and `project.*` write the same field
    file: crates/daemon/src/config.rs
    status: open
    rationale: |
      `update_config_at` was extended with `["reality", X] | ["project", X]`
      match arms for 4 keys (auto_detect / code_embeddings /
      community_detection / max_index_files), but the existing test
      `test_reality_config_update_at` (config.rs:2957) only exercises the
      legacy `reality.*` route. No test calls e.g.
      `update_config_at(path, "project.auto_detect", "false")` and asserts
      `cfg.reality.auto_detect == false`. The match arm is correct by
      inspection (single body shared across both patterns) but if the arms
      are ever split, the regression would be silent. Recommended ~15-line
      test for fix-wave; not release-blocking.
  - id: LOW-3
    severity: LOW
    summary: B-MED-8 act-notification mutual-exclusion runtime check not pinned by test
    file: crates/cli/src/main.rs
    status: deferred
    rationale: |
      The runtime mutual-exclusion check at main.rs:2528-2548 enforces
      `--approve` xor `--reject` (with non-zero exit + actionable message
      for both-set / neither-set cases). No regression test pins this; a
      test would have to live outside `crates/cli/src/main.rs` because
      `tests::test_*` parse helpers in main.rs hit the pre-existing clap
      parser-stack overflow (Phase 11 backlog). Defer or write as a
      shell-level integration test in `tests/scripts/`.
  - id: LOW-4
    severity: LOW
    summary: E-14 close is doc-only — comment block explaining why pattern works, no behavior change
    file: crates/daemon/src/sync.rs
    status: resolved
    fixed_by: fe8054d
    rationale: |
      The audit's claim was that `conn.execute` inside a body wrapped by
      `let tx = conn.unchecked_transaction()?;` might not be transactional.
      SQLite has one active transaction per connection, so writes via the
      same `Connection` while `tx` is alive ARE part of the active tx —
      switching to `tx.execute` is cosmetically clearer but functionally
      identical, and `remember_raw(conn, ...)` takes `&Connection` which
      `Transaction` derefs into. Commit response is a 12-line invariant
      comment block. Documented as a deliberate doc-only close so future
      reviewers don't re-flag it.
  - id: NIT-1
    severity: NIT
    summary: F-MED-9 docs reference `tracing::warn!` but code uses `eprintln!`
    file: docs/observability/otlp-validation.md
    status: open
    rationale: |
      `docs/observability/otlp-validation.md:91` says "the daemon emits a
      `tracing::warn!` line" but the actual code at
      `crates/daemon/src/main.rs:225` uses `eprintln!("[daemon] WARN: ...")`
      because the tracing subscriber isn't installed yet at that point in
      startup (commit body acknowledges this). Doc text is wrong but not
      user-confusing — operators grepping for the warn substring find it
      either way. Update doc to say "stderr WARN line" or `eprintln!`.

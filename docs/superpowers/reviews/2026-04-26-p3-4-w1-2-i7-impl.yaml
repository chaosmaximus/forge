findings:
  # ── HIGH ──────────────────────────────────────────────────────────────
  - id: HIGH-1
    severity: HIGH
    summary: "After c1 migration `code_file.project` stores a NAME (e.g. `forge`), but two ForceIndex re-process branches still pass `f.project` to `run_clustering(conn, project_dir)` which calls `get_reality_by_path` with that NAME — silently disabling clustering for every no-path force-index"
    file: crates/daemon/src/server/handler.rs:4918
    status: deferred
    rationale: "c1 changed the semantics of `code_file.project` from PATH to NAME (basename). Every code_file row written post-migration carries a NAME. Two production sites still consume that field as if it were a PATH: handler.rs:4918-4920 (Request::ForceIndex { path: None } re-process branch) and writer.rs:402-405 (writer-queue equivalent). Both build a HashSet from `f.project.clone()` and call `crate::workers::indexer::run_clustering(&state.conn, project_dir)` for each. `run_clustering` (indexer.rs:1481) calls `ops::get_reality_by_path(conn, project_dir, \"default\")` which matches `reality.project_path = ?1` exactly — a path string. With a NAME like `forge` instead of `/mnt/.../forge`, the reality lookup returns None and the early-return path skips clustering entirely. Net effect: every no-path `forge-next force-index` post-W1.2 silently disables community detection on the import graph (the source of `cluster_files`/`cluster_name` in BlastRadius output). The indexer's *internal* call sites at indexer.rs:836 and indexer.rs:941 still pass the original `project_dir` parameter (the PATH), so first-time indexing continues to cluster correctly — the break is only on no-path re-process. Same shape applies to `auto_detect_conventions(conn, project_dir)` if it were called from these branches: it reads conventions files relative to project_dir, and a NAME input would silently no-op the disk scan. **Fix:** either (a) re-resolve `project_dir` from the basename via the reality table — `ops::reality_path_by_name(conn, &name)` and pass the path through, OR (b) change `run_clustering` and `auto_detect_conventions` to accept a project name and look up the reality by name (requires a `get_reality_by_name` accessor). (a) is the smaller diff; (b) aligns the helpers with the new column semantics. Either way, add a regression test that calls `Request::ForceIndex { path: None }` post-migration and asserts `cluster_files` is non-empty for at least one project. **Deferred** to the P3-4 W1.2 fix-wave — direct consequence of the c1 column-semantics flip; track as a fix-wave commit before opening #164+ dogfood surfaces."
  - id: HIGH-2
    severity: HIGH
    summary: "`db::ops::derive_project_name` is defined as `pub` and doc-commented as the rich variant 'used at handler entry-points', but has zero callers in production or tests — the dual-helper architecture claim in the commit message + memory is aspirational, not delivered"
    file: crates/daemon/src/db/ops.rs:83
    status: deferred
    rationale: "The W1.2 c1 commit message describes a dual-helper pattern: `indexer::project_name_from_dir` (basename-fast, hot path) + `db::ops::derive_project_name(conn, dir)` (reality-table-aware, cool path). The fast variant is correctly wired at 5 indexer write sites. **The rich variant has zero callers** — `grep -rn derive_project_name crates/` yields the function definition + 2 doc-comment references and nothing else. The commit message claims it is 'used at handler entry-points'; the dual-helper memory says it 'takes a Connection, attempts a structured lookup ... then walks parent directories to find a registered ancestor reality'. Neither claim is reflected in the code at HEAD `af43257`. The handler entry-points that should benefit (e.g. `Request::ForceIndex` with `--path <dir>` where the user supplied path may live under a registered reality with a different NAME — monorepo subdir case) call `index_directory_sync(&state.conn, &canonical)` directly, which uses the basename-only fast variant via `project_name_from_dir`. That means if a user has a reality registered at `/repo/forge` with name `forge` and does `forge-next force-index --path /repo/forge/sub-crate`, the file rows get tagged with `sub-crate` instead of `forge` — silently splitting the project's code graph. **Fix:** either (a) wire `derive_project_name` at the ForceIndex entry-point so the user-supplied path is normalized through reality-walk-up before being handed to the indexer, OR (b) delete the dead function and remove the dual-helper architectural claim from the commit message + memory. Today's code is the worst of both: it carries the API surface and the public doc-comment without the runtime behavior. **Deferred** to the P3-4 W1.2 fix-wave — pair with HIGH-1 since both close around the run_clustering / derive_project_name semantic alignment."
  - id: HIGH-3
    severity: HIGH
    summary: "Migration backfills `code_file.project` from PATH to basename but does NOT delete pre-W1.2 foreign-project pollution (code_file/code_symbol/edge rows from `mnt`-rooted leaks); production DBs that upgrade without a wipe retain 10k+ foreign-user rows under `--project mnt`"
    file: crates/daemon/src/db/schema.rs:975
    status: deferred
    rationale: "The c3 commit's live verification (`forge|188`) was on a fresh DB after a manual wipe (`forge.db.pre-W1.2-wipe-20260426-145000.bak (219 MB pre-wipe baseline)` per HANDOFF.md:167). The c1 migration *renames* legacy PATH-tagged rows to basename — so a row that was `project = '/mnt'` becomes `project = 'mnt'`, a row that was `/mnt/colab/.../foreign-user/.cache/jupyter/file.py` (somehow tagged) becomes basename-of-that. **No DELETE of foreign-project rows.** Production DBs that upgrade through this migration without a wipe retain every code_file/code_symbol/edge row from the pre-c3 `/mnt`-rooted indexer scope, just under different tags. `forge-next find-symbol main --project mnt` on such a DB will still return 50+ hits from a different user's $HOME. The CLI surface c2 ships happily filters them; that's the symptom the user already saw. **The c3 fix prevents future pollution but doesn't undo past pollution.** Single-tenant on Unix socket bounds the blast radius — but the operator-facing surprise is real (an upgrade quietly leaks 10k+ files under the new sentinel). **Fix:** either (a) ship a one-shot companion migration `DELETE FROM code_file WHERE project IN ('mnt','home','usr','var','tmp','etc','opt','srv') AND project_path IS NULL` (with cascading deletes on code_symbol via file_path and edge via from_id/to_id), OR (b) add an operator-facing migration note to docs/operations.md and the v0.6.0-rc.4 changelog stating that users should delete `~/.forge/forge.db` (or a `forge-next maintenance vacuum-foreign --since-version 0.6.0-rc.3` admin command) before upgrading. The HANDOFF mentions the pre-wipe backup but not the upgrade procedure for users. As written this is a silent data-quality regression in the form of stale rows persisting under newly-renamed tags. **Deferred** to a fix-wave commit — single-tenant Unix-socket deployment shape bounds the blast radius (no auth hop crossed); the cleanup migration is mechanical and the docs note is one paragraph. Track in #163 fix list before publishing v0.6.0-rc.4."
  # ── MEDIUM ────────────────────────────────────────────────────────────
  - id: MED-1
    severity: MEDIUM
    summary: "W29 and W30 each shipped a dedicated migration regression test (`p3_3_11_w29_project_sentinel_backfill`, `p3_3_11_w30_identity_project_sentinel_backfill`); W1.2 c1 ships no equivalent for the PATH→basename SUBSTR/REVERSE/INSTR backfill"
    file: crates/daemon/src/db/schema.rs:975
    status: open
    rationale: "W29 c1 (`ede5c38`) added `p3_3_11_w29_project_sentinel_backfill` which builds a pre-migration table shape, runs `create_schema`, asserts the backfill values, and asserts idempotence. W30 mirrored that pattern at `p3_3_11_w30_identity_project_sentinel_backfill`. Both tests live in `db::schema::tests`. **W1.2 c1 ships none.** The SUBSTR/REVERSE/INSTR SQL is non-trivial and was not validated by any unit test before merge. Edge cases not covered: (a) `project = '/foo'` (single-component) — should yield `foo`; (b) `project = '/'` (root) — should yield empty → sentinel; (c) `project = '/foo/'` (trailing slash) — yields empty → sentinel, **legitimate basename `foo` is lost**; (d) `project = 'forge'` (already-basename) — should be no-op; (e) idempotence on second run. The migration is one-shot and irreversible per DB, so a corner-case bug here means a corrupted `code_file.project` column on first daemon start. **Fix:** add `p3_4_w1_2_code_file_project_basename_backfill` test mirroring W29/W30 — pre-W1.2 row shape with diverse path formats (rooted, trailing-slash, already-basename, NULL, empty), run create_schema, assert each row's post-migration value, run create_schema again, assert no change. This is the established pattern in this repo and should not skip for a third schema migration."
  - id: MED-2
    severity: MEDIUM
    summary: "Harness layer (skills/, agents/, hooks/) has zero references to the new `--project` flag — agents reading SKILL.md examples will continue invoking `find-symbol`/`code-search`/`blast-radius` without scope, leaking cross-project hits"
    file: skills/forge-feature/SKILL.md
    status: open
    rationale: "Per CLAUDE.md: 'Daemon changes without matching harness updates are incomplete changes.' `grep -rn '--project' skills/ agents/ hooks/` returns zero hits when filtered to `find-symbol|code-search|blast-radius`. The skills that document these commands (`forge-feature/SKILL.md` line 41/51, `forge-debug/SKILL.md` lines 25/81/84/142, `forge-tdd/SKILL.md` line 35, `forge-think/SKILL.md` line 142, `forge-verify/SKILL.md` line 62, `agents/forge-planner.md` lines 56/62) all reference the bare unscoped form. The plugin.json protocol_hash is correctly bumped (`f8c1d4f04563…` matches request.rs), and `bash scripts/check-harness-sync.sh` returns OK at 155+107 — but the `harness-sync` gate doesn't catch un-propagated CLI flag rationale in skills MD prose. Net effect: agents executing the skills' template invocations continue using the legacy unscoped find-symbol that was the original I-7 leak surface. **Fix:** sweep the 7 skills + 1 agent file and add `--project <project-name>` (or a templated `--project ${FORGE_PROJECT}` placeholder) to every template invocation, with a 1-2 sentence rationale per skill on what omitting `--project` means. The fix is mechanical; the test is `grep -c '\\-\\-project' $(grep -rl 'find-symbol\\|code-search\\|blast-radius' skills/ agents/)` should be non-zero per file."
  - id: MED-3
    severity: MEDIUM
    summary: "Migration's basename SQL `SUBSTR(project, LENGTH(project) - INSTR(REVERSE(project), '/') + 2)` reduces a trailing-slash path like `/foo/` to empty string, which the next pass coerces to `_global_` — a real project tagged with a trailing slash loses its name to the sentinel"
    file: crates/daemon/src/db/schema.rs:977
    status: open
    rationale: "Walking the SQL math for `project = '/foo/'`: REVERSE = `/oof/`, INSTR(_, '/') = 1 (first char of reversed string), LENGTH = 5, expression = LENGTH - INSTR + 2 = 6, SUBSTR(project, 6) returns characters from position 6 in a 5-char string → empty string `''`. The second UPDATE then fires (`project = '_global_' WHERE project IS NULL OR project = ''`) and the row gets the sentinel. **A real project that was tagged with a trailing slash is silently demoted to global.** Production indexer paths from `tempfile::tempdir()`/`std::env::current_dir()`/canonicalize() don't typically have trailing slashes, but a hand-edited DB or a future code change that calls `store_file` with a path ending in `/` hits this. The W29/W30 sentinel migrations are simpler (NULL/empty → sentinel) and don't have this corner case because they don't try to extract a basename from SQL. **Fix:** strip trailing slashes before the SUBSTR — `WHERE project LIKE '/%' AND INSTR(REVERSE(project), '/') > 0 AND project NOT LIKE '%/'` — or pre-trim trailing slashes with `project = RTRIM(project, '/')` in a separate UPDATE. Combined with MED-1 (no migration test), this corner is unverified and its fix would be invisible until production hits a real trailing-slash row."
  # ── LOW ───────────────────────────────────────────────────────────────
  - id: LOW-1
    severity: LOW
    summary: "Depth-floor `≥4 slashes` heuristic in `find_project_dir` is host-shape coupled — works for `/mnt/colab-disk/DurgaSaiK/forge` (dev box layout) but rejects realistic project paths on hosts where projects live shallower (e.g. `/srv/foo`, `/opt/repo`)"
    file: crates/daemon/src/workers/indexer.rs:313
    status: open
    rationale: "The c3 fix introduces `candidate.matches('/').count() >= 4` as the depth floor. The commit message and memory describe `/mnt/colab-disk/DurgaSaiK/forge` as the canonical 4-slash project root and document the floor as 'empirically tuned for typical project depth'. On a server where projects live at `/srv/foo` (2 slashes) or `/opt/myrepo` (2 slashes), or on a CI runner where `/runner/_work/repo/repo` (4 slashes) is the fallback, the threshold breaks legitimately-shallow project layouts. The decode-fallback memory itself recommends a marker-file fallback (Cargo.toml/.git) as the better long-term play. There is no tracking issue or TODO comment for that follow-up. **Fix:** either (a) add a marker-file check (`Cargo.toml`/`package.json`/`.git`/`pyproject.toml` exists in candidate) as an OR-condition with the depth floor, OR (b) make the floor configurable via env var (`FORGE_INDEXER_MIN_PATH_DEPTH=4`, default 4) so unusual layouts can opt down. (a) is the more principled fix per the memory's own guidance."
  - id: LOW-2
    severity: LOW
    summary: "FORGE_PROJECT env path in `find_project_dir` skips the depth-floor — `FORGE_PROJECT=/mnt` directly returns `/mnt` and the indexer walks every subtree under it"
    file: crates/daemon/src/workers/indexer.rs:259
    status: open
    rationale: "`find_project_dir` checks FORGE_PROJECT first and returns the env value verbatim if `is_dir()`. The depth floor introduced in c3 only applies to the Claude-transcript-decode branch (lines 290-318). If a user opt-in sets `FORGE_PROJECT=/mnt`, the indexer happily walks /mnt with no defense. The existing `test_find_project_dir_env` even pins `FORGE_PROJECT=/tmp` as valid (line 1591). User-explicit opt-in lowers severity, but it's the same bug shape c3 just closed on a different code path. **Fix:** apply the depth floor to the FORGE_PROJECT branch too — `if dir.matches('/').count() >= 4 && Path::new(&dir).is_dir()` — and update `test_find_project_dir_env` to use a 4-slash path. Or, more strictly, require FORGE_PROJECT to point at a directory containing a marker file (Cargo.toml/.git) when the path is shallower than 4 slashes."
  - id: LOW-3
    severity: LOW
    summary: "BlastRadius handler has a dead `(bool, &str)` tuple `scope_msg` populated but never read; explicit `let _ = scope_msg;` to suppress the warning is a code-review anti-signal"
    file: crates/daemon/src/server/handler.rs:2614
    status: open
    rationale: "Lines 2614-2647 define `let (file_exists, scope_msg): (bool, &str) = match project_filter.as_deref() { Some(_) => (exists, \"project\"), None => (exists, \"\") };`. The second tuple element is never consumed — the actual `scope_hint` string is reconstructed independently inside the `if !file_exists` branch from `project_filter.as_deref()`. The `let _ = scope_msg;` comment at line 2647 acknowledges the dead binding but kept it. Cosmetic — clippy would have caught `unused_variables` without the explicit `_` pattern. **Fix:** drop the second tuple element entirely; have the match arms return only the `bool`. The author probably intended `scope_msg` to drive the conditional formatting and forgot to use it. Removing it is a 4-line diff, no behavior change."
  - id: LOW-4
    severity: LOW
    summary: "Empty-string `--project \"\"` accepted by CLI and forwarded to daemon as `Some(\"\")`; daemon's JOIN filter `cf.project = ''` matches no row post-migration → silent fail-closed with no actionable error"
    file: crates/cli/src/main.rs:551
    status: open
    rationale: "`forge-next find-symbol foo --project \"\"` clap-parses to `project: Some(\"\".to_string())`. The CLI passes that into `Request::FindSymbol { project }`. The daemon's WHERE clause becomes `cf.project = ''` — and post-c1 migration no row has project = '' (every row is `_global_` or a basename). Result: zero hits, prints `No symbols found.`. Same trap as MED-2 in the W29 review (`--project string accepts arbitrary input with no cross-check against known realities`). The user sees a silent fail-closed with no hint that their input was nonsensical — they may conclude the symbol doesn't exist when really their flag was malformed. **Fix:** at the CLI entry-point, treat `Some(\"\")` as `None` (or reject with `error: --project must be non-empty`). The same fix-shape covers whitespace-only inputs (`--project \" \"`)."
  - id: LOW-5
    severity: LOW
    summary: "W1.2 c2 introduced 3 new `\"path\":` JSON emit sites in `code_search` while the CLI consumer reads `\"file_path\"` — pre-existing key drift was widened but not fixed"
    file: crates/daemon/src/server/handler.rs:4811
    status: open
    rationale: "Daemon `code_search` handler emits `serde_json::json!({..., \"path\": row.get::<_, String>(3)?, ...})` (handler.rs lines 4811, 4840, 4854 — 3 sites; the project-filter branch added in c2 introduced these 3 NEW sites). CLI reader `commands/system.rs:2194` reads `hit.get(\"file_path\")` and renders `?` if missing. `forge-next code-search foo --kind function` displays `name (function) — ?:42` for every hit. **Pre-existing bug** — pre-c2 code already had the same drift on the non-project branches, so commit `ea76e82` is not the originator. But c2 *expanded* the bug surface by 3 NEW emit sites without normalizing the key. The c2 live-verification claim only exercised `find-symbol --project forge` (typed-roundtrip path, not the json-blob path), so the bug surface widened without observation. Same shape as the `serde_json::json! macro silent drift` auto-memory. **Fix:** rename the JSON key in handler.rs to `\"file_path\"` at all 3+ emit sites and add a contract test that constructs a fixture, calls `Request::CodeSearch`, and asserts the JSON contains `file_path`. Out of strict W1.2 scope but the c2 commit's live verification missed this because it never tested the surface."
  - id: LOW-6
    severity: LOW
    summary: "JOIN-based filter `code_symbol s JOIN code_file f ON s.file_path = f.path WHERE f.project = ?` is correct but query-plan-fragile — composite index `(project, path)` would be more robust than the new single-column `idx_code_file_project`"
    file: crates/daemon/src/db/schema.rs:376
    status: open
    rationale: "The new index is `CREATE INDEX idx_code_file_project ON code_file(project)` — single column. The JOIN SQL has two filter knobs: `s.name LIKE ?1` (covered by `idx_code_symbol_name`) and `f.project = ?2` (covered by the new index). SQLite's planner picks one of: (a) start from `code_symbol`, scan via `idx_code_symbol_name`, per-row indexed lookup on `code_file.path` (UNIQUE), then post-filter on `f.project` (the new index doesn't help here); (b) start from `code_file`, scan via `idx_code_file_project`, JOIN code_symbol via `idx_code_symbol_file`. (b) is more selective when the project has a small fraction of files (e.g. forge=188 / 10193 ≈ 1.8%); (a) is better when the LIKE pattern is highly selective. The choice depends on stats; without `ANALYZE` (which the daemon doesn't run automatically) the planner picks (a) by default and the new index is unused. **Fix:** either (a) replace `idx_code_file_project` with a composite `idx_code_file_project_path ON code_file(project, path)` so a project-filtered scan can also satisfy the JOIN's path lookup, OR (b) explicitly run `ANALYZE` after the migration. Performance — not correctness — concern; flagged because the index was added with the JOIN read-path in mind and the chosen shape doesn't fully serve that intent."
  - id: LOW-7
    severity: LOW
    summary: "Cargo.toml fastembed-pin comment names `scripts/setup-dev-env.sh`, but setup-dev-env.sh's `ORT_VERSION=\"1.23.0\"` line has no reverse cross-reference back to the fastembed pin — operator bumping ONNX RT might forget to unpin"
    file: scripts/setup-dev-env.sh:16
    status: open
    rationale: "`crates/daemon/Cargo.toml:93-101` documents the unpin condition: '`v0.6.1+ should re-evaluate when ONNX Runtime 1.24+ ships in `.tools/` (requires updating scripts/setup-dev-env.sh + .cargo/config.toml + scripts/with-ort.sh).' This is correct. But the reverse coupling — bumping ORT_VERSION in setup-dev-env.sh requires also unpinning fastembed in Cargo.toml — has no comment in setup-dev-env.sh. An operator who bumps ORT to 1.24 to take a security fix may not know to also touch the daemon's Cargo.toml. **Fix:** add a 1-line comment above `ORT_VERSION=\"1.23.0\"` in setup-dev-env.sh: `# Pinned alongside crates/daemon/Cargo.toml's fastembed = \"=5.11.0\"; bump both together.` Mechanical, no automation."
  - id: LOW-8
    severity: LOW
    summary: "`derive_project_name` hardcodes `\"default\"` as the reality-table organization scope; multi-org deployments with non-default scopes silently fall back to basename instead of using the registered reality name"
    file: crates/daemon/src/db/ops.rs:87
    status: open
    rationale: "Lines 87 and 98 both call `get_reality_by_path(conn, ..., \"default\")`. The W1.2 c1 commit message describes the function as 'reality-table-aware' but never mentions org-scope. `reality.organization_id` is a real column (db/schema.rs reality table); multi-org deployments use non-default scopes for scoping the reality registry. With a hardcoded `\"default\"` scope, this helper would silently miss any reality registered under a different org_id and fall back to basename. Since the function is dead code today (HIGH-2), this is dormant — but if/when a caller is wired in, this surfaces as a multi-tenant correctness bug. **Fix (preventive):** accept `org_id: &str` as a parameter, or use `forge_core::organization::current_organization_id()` (or whatever the canonical accessor is). Today's hardcoded `\"default\"` is OK for the single-org Forge deployment but inconsistent with the W30 identity work which is already org-scoped."
  - id: LOW-9
    severity: LOW
    summary: "Regression test `p3_4_w1_2_find_project_dir_rejects_shallow_filesystem_roots` exercises depth-floor math on abstract paths but does NOT reproduce the actual bug input — a Claude transcript dirname with underscores like `dhruvishah_finexos_io` that doesn't reverse under dash↔slash decode"
    file: crates/daemon/src/workers/indexer.rs:2345
    status: open
    rationale: "The test asserts: `find_project_dir_candidate_for_test(\"/mnt\")=None`, `(\"/mnt/foo\")=None`, `(\"/mnt/colab/disk\")=None` (3 slashes), `(\"/mnt/colab-disk/DurgaSaiK/forge/leaf\")=Some(\"/mnt/colab-disk/DurgaSaiK/forge\")`. Both branches (reject + admit) are pinned, satisfying the depth-floor memory's 'assert both' requirement. **But the bug *input* — a dash-decoded transcript path that grounds at /mnt because of un-reversed underscores — is not reproduced.** A future change to the decode logic (e.g. fixing the underscore round-trip via a different encoding scheme) could break the original I-7 reproducer without breaking this test. Separately, `find_project_dir_candidate_for_test` mirrors the production loop **without** the `is_dir()` check (it's `#[cfg(test)] #[allow(dead_code)]`); if a future change accidentally drops `is_dir()` from production but keeps the segment-count check, the test will be silent. **Fix:** add a second test that mocks `~/.claude/projects/-mnt-colab-disk-DurgaSaiK-forge-dhruvishah_finexos_io-foo` as a transcript dir entry, monkeypatches HOME, calls the real `find_project_dir`, and asserts it does NOT return `/mnt`. Requires `tempfile::tempdir` for HOME and a live directory with the underscores intact."
  - id: LOW-10
    severity: LOW
    summary: "BlastRadius cluster-expansion path explicitly NOT scoped to project filter (c2 commit text); on a DB with pre-W1.2 cross-project edges, `--project forge` BlastRadius can still emit foreign callers via `cluster_files`/`importers` since edges aren't project-tagged"
    file: crates/daemon/src/server/handler.rs:2571
    status: open
    rationale: "The c2 commit message says 'cluster-expansion path stays unchanged (clusters are derived from import edges and naturally follow code structure)' — i.e. the project filter is applied to the file-existence warning text but NOT to `analyze_blast_radius` itself. `br.callers`, `br.importers`, `br.cluster_files`, `br.calling_files` come from `crate::guardrails::blast_radius::analyze_blast_radius(&state.conn, &file)` which reads from `edge` and `code_symbol` tables. Pre-W1.2 indexed cross-reality edges (foreign user $HOME importing forge symbols) persist in `edge` after the migration since c1 only touched `code_file.project`. The justification 'imports naturally follow code structure' assumes a clean DB; on a polluted-then-renamed DB (HIGH-3 carryover scenario), `forge-next blast-radius foo --project forge` could emit foreign callers in `cluster_files` even though the file-existence warning is properly scoped. **Fix:** in `analyze_blast_radius`, accept an optional `project_filter: Option<&str>` and JOIN code_file at the cluster/edge expansion to filter callers. Or, more simply, on the DELETE-cleanup recommended in HIGH-3, the edges become unreachable and this surface auto-closes."

  # ── HIGH ──────────────────────────────────────────────────────────────
  - id: HIGH-1
    severity: HIGH
    summary: "W22 spawn_blocking task is fire-and-forget — JoinHandle dropped, panics swallowed silently, SIGTERM aborts mid-write"
    file: crates/daemon/src/server/writer.rs:345
    status: deferred
    rationale: "`tokio::task::spawn_blocking(move || run_force_index_in_task(...))` returns a JoinHandle that is dropped immediately. Three concrete problems: (a) **Panic boundary** — if `run_force_index_in_task` panics (regex compile failure, OOM in clustering, sqlite assertion), the panic is captured by `JoinError` but never observed. The panic message goes to the runtime's panic hook (default behavior: print to stderr) but the daemon has no signal that indexing failed; the next CLI call sees no symptom. Compare `kpi_reaper::run_reap_blocking` (line 241) which `await`s the JoinHandle and matches `Ok(Ok)/Ok(Err)/Err` arms. (b) **No shutdown coordination** — the daemon's P3-2 W7 SIGTERM handler routes through a `watch::channel`, but the spawn_blocking task knows nothing about it. On SIGTERM, the runtime is dropped while the indexer is mid-INSERT; SQLite WAL is robust against this (atomic-commit), but a partially-written `code_symbol` table or a clustering pass that wrote half its edges is committed-or-rolled-back at *transaction* granularity, not pass granularity — so the on-disk state is split-brain (some files indexed, others not). The previous synchronous handler held the writer mutex until completion, so SIGTERM blocked until done. (c) **No backpressure / deduplication** — two near-simultaneous `force-index` calls spawn two tasks that both walk the entire tree and both contend on the SQLite writer. Mitigation: at minimum, log panics via `JoinHandle::abort_handle` + supervisor task; track in-flight indexing with an `AtomicBool` and reject overlapping calls with `Response::Error { message: \"index already running\" }`. **Deferred to P3-3.10 follow-up wave** — the fix wave is otherwise lockable, but a supervisor task wrapping the spawn_blocking + concurrency-guard is the most actionable next step."
  - id: HIGH-2
    severity: HIGH
    summary: "W21 plan said `Same for respond` — SessionRespond protocol still has no caller-identity surface (silently descoped)"
    file: docs/superpowers/plans/2026-04-26-dogfood-fixes-plan.md:67-68
    status: deferred
    rationale: "The plan-doc explicitly enumerates `crates/cli/src/main.rs — add --from <SESSION_ID> flag to the Send subcommand. Same for respond.` The implemented commit only touches `Send` and `TeamSend`. `Request::SessionRespond` (request.rs:506-510) carries `message_id`, `status`, `parts` — no `from_session` field at all. **Worse**: there is no `forge-next respond` CLI subcommand at all (verified: `grep -n 'respond' crates/cli/src/main.rs` returns only an unrelated `responding` status string). So a planner→generator→evaluator round-trip CAN'T close the loop via CLI today — receivers can `messages` but cannot `respond` from the CLI. The W21 commit ships only half of F11 — outbound caller identity is fixed for new messages, but the response leg is still inaccessible. Either (a) explicitly note in the commit/HANDOFF that `respond` is descoped to a follow-up, or (b) add the missing `respond` subcommand in this wave. As written, future readers of the plan will assume both halves shipped."
  # ── MEDIUM ────────────────────────────────────────────────────────────
  - id: MED-1
    severity: MEDIUM
    summary: "W22 path validation had a TOCTOU window — caller path canonicalised twice (synchronous validate, then again in spawned task) without holding any lock"
    file: crates/daemon/src/server/writer.rs:319-340
    status: resolved
    fixed_by: 39f84b2
    rationale: "Resolved in W23 fix-wave (`39f84b2`): `process_force_index_async` now resolves the caller path to its canonical form once on the writer-actor thread and hands the canonical `String` into the spawn closure. `run_force_index_in_task`'s `Some(canonical)` arm walks the path directly — no second canonicalize. Original concern: between the two canonicalize calls the directory could be renamed (canonicalize succeeds with stale path, indexer walks empty tree silently), deleted (canonicalize errors, fallback `unwrap_or(dir)` walked the pre-canonical relative path), or replaced with a symlink (path-traversal foothold under admin-RBAC). Severity MEDIUM because force-index is admin-only (rbac-gated per handler.rs:4674), but W22 had introduced the TOCTOU that the prior synchronous handler didn't have."
  - id: MED-2
    severity: MEDIUM
    summary: "W21 `eprintln!` warning fires unconditionally on every send-with-no-identity — doc-comment claimed 'one-time' but there's no `Once` guard"
    file: crates/cli/src/commands/system.rs:851,861-865
    status: resolved
    fixed_by: 39f84b2
    rationale: "Resolved in W23 fix-wave (`39f84b2`): doc-comment rewritten to 'stderr warning per CLI invocation' with an explicit note that long-lived callers (REPL, library) would emit per call. Implementation behaviour unchanged — `forge-next` is a one-shot CLI process, so the per-invocation warning is correct in practice; only the doc-comment was misleading. `Once`-guarding the eprintln was considered and rejected as out-of-scope: scripts that loop `forge-next send` are still per-process so each call already gets its own one-shot warning, and a `Once` would silence the warning entirely for in-process REPL callers (defeating the F11/F13 nudge)."
  - id: MED-3
    severity: MEDIUM
    summary: "W22 backwards-compat heuristic `files_indexed == 0 && symbols_indexed == 0` → 'background started' will mislead users on legitimately-empty projects"
    file: crates/cli/src/commands/system.rs:1716-1727
    status: open
    rationale: "The CLI now infers async dispatch from `(0, 0)` counts. But: (1) a brand-new empty project directory legitimately yields `(0, 0)` and the user sees the misleading message 'Indexer dispatched in background. Watch ~/.forge/daemon.log'. (2) Worse, if the spawn_blocking task PANICS during the actual indexing pass, the CLI already returned the same `(0, 0)` ⇒ the user sees 'dispatched in background' and waits indefinitely for nothing. (3) A pre-W22 daemon truly returning `(0, 0)` from a synchronous failure (e.g., empty directory) would also print 'background started' incorrectly. **Better protocol shift**: add a `ResponseData::IndexStarted` variant or a `dispatched: bool` field to disambiguate. Acknowledged as 'acceptable degradation' in the prompt, but flagged because the misleading text is on the user-visible critical path."
  - id: MED-4
    severity: MEDIUM
    summary: "W22 background task runs `init_sqlite_vec` redundantly + executes `PRAGMA journal_mode=WAL` on every dispatch — wasted SQLite I/O on each force-index"
    file: crates/daemon/src/server/writer.rs:374-385
    status: open
    rationale: "`crate::db::vec::init_sqlite_vec()` is `Once::call_once`-guarded (db/vec.rs:13) — calling it from the spawn_blocking task is a no-op after the daemon's first call, so the call is HARMLESS but redundant. More concerning: every dispatch runs `PRAGMA journal_mode=WAL; PRAGMA busy_timeout=10000;` on a **freshly-opened** connection. WAL mode is a persistent file-level setting (verified by SQLite docs: once set, the journal_mode header in the DB file persists), so the PRAGMA is idempotent but the round-trip still serialises through the writer mutex briefly. With 30s indexer passes this is irrelevant; with future <1s targeted dispatches it becomes measurable. Cosmetic at observed scales; structural for performance work in P3-3.10+. Compare kpi_reaper.rs:246 which uses `busy_timeout=5000` — W22 picked 10000 with no documented rationale (different value than the canonical reaper precedent)."
  # ── LOW ───────────────────────────────────────────────────────────────
  - id: LOW-1
    severity: LOW
    summary: "W21 unit tests use `Mutex<()>` env-guard but a panic between `set_var` and `remove_var` poisons the mutex AND leaks env state into sibling tests"
    file: crates/cli/src/commands/system.rs:2829-2864
    status: open
    rationale: "The test pattern is `let _guard = ENV_LOCK.lock().unwrap(); set_var(...); resolve_from_session(...); remove_var(...);`. If `resolve_from_session` panics mid-call (or any future change adds an `assert!`), the panic propagates *with the lock still held* and the env var still set. Result: (1) sibling tests in the same process see the leaked `FORGE_SESSION_ID`; (2) the next test that calls `ENV_LOCK.lock().unwrap()` fails with `PoisonError`, masking the original panic. Standard Rust pattern is `temp_env::with_var` or a custom `Drop`-based guard that calls `remove_var` regardless of unwind. Today the tests pass because `resolve_from_session` is too simple to panic, but the lock pattern is fragile. Low because tests-only and currently green."
  - id: LOW-2
    severity: LOW
    summary: "W20 forwards LD_LIBRARY_PATH but NOT companion vars (LD_PRELOAD, LD_AUDIT, LD_BIND_NOW) — security debate, but inconsistency unsigned"
    file: crates/cli/src/client.rs:18-29
    status: open
    rationale: "The forwarded set is `{LD_LIBRARY_PATH, DYLD_LIBRARY_PATH, DYLD_FALLBACK_LIBRARY_PATH}`. **Intentionally NOT forwarded**: `LD_PRELOAD` (security: would let an attacker who controls the env preload arbitrary .so files into the daemon — correct to drop); `LD_AUDIT` (similar attack surface); `LD_BIND_NOW`, `LD_DEBUG` (debug aids — could be useful for support but not load-time blocking). On macOS the parallel set includes `DYLD_INSERT_LIBRARIES` (LD_PRELOAD analog) and `DYLD_FRAMEWORK_PATH`. The current allowlist is defensible but the rationale is undocumented in code or commit. Either add a one-liner block-comment to FORWARDED_ENV_KEYS ('LD_PRELOAD/LD_AUDIT intentionally excluded — preload-attack surface'), or mention the security boundary in client.rs's module-doc. Today an auditor must reconstruct the rationale from absence."
  - id: LOW-3
    severity: LOW
    summary: "W20 unit tests are shape-checks only — they verify the const contains the keys but never exercise `std::env::var` propagation through `Command::envs(...)`"
    file: crates/cli/src/client.rs:267-291
    status: open
    rationale: "Both `forwarded_env_keys_include_dynamic_loader_paths` and `forwarded_env_keys_include_forge_runtime_basics` assert `FORWARDED_ENV_KEYS.contains(&\"LD_LIBRARY_PATH\")` — pure constant-array lookup, would also pass if the runtime forwarding loop were deleted. The actual end-to-end behavior (env var reads → `envs.push(...)` → `Command::envs(envs)` → spawned process inherits) is verified only by the live `/proc/<daemon>/environ` check in the commit message. A unit test that mock-spawns a `bash -c 'printenv LD_LIBRARY_PATH'` child after `set_var` would lock the runtime path; today, dropping the `if let Ok(v) = std::env::var(key)` block would not fail any unit test."
  - id: LOW-4
    severity: LOW
    summary: "W22 does not propagate `FORGE_SESSION_ID` or other runtime envs to the spawn_blocking task — irrelevant for indexer today but a precedent trap"
    file: crates/daemon/src/server/writer.rs:336-347
    status: open
    rationale: "The closure captures `db_path` and `path_for_task` only. The indexer pass currently reads no environment, so this is a non-issue. But if a future indexer feature adds env-driven config (e.g., `FORGE_INDEX_PARALLELISM`, `FORGE_INDEXER_PROJECT_FILTER`), the spawn_blocking thread inherits the parent process's env at *spawn time*, which is correct for `std::thread`-style semantics but surprising if the daemon's env was modified post-startup. Documenting the env-capture model now (in the doc-comment) future-proofs the precedent. Cosmetic / forward-looking."
  - id: LOW-5
    severity: LOW
    summary: "W22 `IndexComplete { 0, 0 }` returned synchronously is technically a protocol-shape regression for any client that reads counts — no schema_version bump, no harness sync change"
    file: crates/daemon/src/server/writer.rs:347-352
    status: open
    rationale: "The protocol enum `ResponseData::IndexComplete` keeps its shape (`files_indexed: usize, symbols_indexed: usize`), so JSON consumers parse the same fields. **But** the *meaning* changed: pre-W22, those fields reflected actual on-disk effect; post-W22, they're unconditionally zero. No `protocol/contract_tests.rs` update was made, no docs/api-reference change. A scripted integration test piping `forge-next force-index --json | jq '.symbols_indexed > 0'` was previously a valid smoke-test of indexing-completed; W22 silently breaks that semantics without bumping any version surface. Mitigation: either (a) introduce `ResponseData::IndexStarted { task_id }` as a new variant (real protocol shift, requires harness-sync), or (b) add a regression note in `docs/api-reference.md` for the ForceIndex method. Found no consumers in tests/scripts/ today — but the asymmetry is a footgun."
  # ── NIT ───────────────────────────────────────────────────────────────
  - id: NIT-1
    severity: NIT
    summary: "W22 spawn_blocking closure tracing call uses `?path_for_task` Debug-format — wrapping `Option<String>` produces ugly output like `path_for_task=Some(\"/foo\")`"
    file: crates/daemon/src/server/writer.rs:340-344
    status: open
    rationale: "`tracing::info!(?path_for_task, ...)` formats as `path_for_task=Some(\"/path\")` for set values and `path_for_task=None` for default. Standard practice: `path = path_for_task.as_deref().unwrap_or(\"<default>\")` for cleaner log lines. Cosmetic only."
  - id: NIT-2
    severity: NIT
    summary: "W22 `path_for_task` rebinding is dead — could just `move || run_force_index_in_task(&db_path, path)` with original `path` name"
    file: crates/daemon/src/server/writer.rs:337
    status: open
    rationale: "`let path_for_task = path;` is a rename with no transformation, then both the tracing call and the closure use `path_for_task`. Eliminating the rebinding by renaming the parameter or using `path` directly throughout is one fewer variable for a future reader. Cosmetic."

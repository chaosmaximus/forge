  - id: RESOLVED-9
    severity: LOW
    summary: "WAL mode is per-database file (persistent header), not per-connection — multiple connections from spawn_blocking + writer-actor coexist safely"
    file: crates/daemon/src/server/writer.rs:382
    status: resolved
    fixed_by: 611169b
    rationale: "Per SQLite docs (https://sqlite.org/wal.html §3): WAL mode is set by `PRAGMA journal_mode=WAL` on any connection and persists in the database header. Subsequent connections automatically use WAL without needing the PRAGMA. The W22 setup PRAGMA is harmless and ensures correct mode if the file is fresh. Inter-connection writes serialize at the transaction level via the WAL-index lock, NOT at the open-connection level — so the writer-actor's connection and the spawn_blocking task's connection coexist correctly. Live verification in the W22 commit message (concurrent send 9.4s instead of 30s timeout) confirms the architecture works."

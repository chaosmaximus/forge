      treats it as shipped. agent-development.md:81 advertises the gRPC
      endpoint URL form. Drop the "(Planned)" qualifier in security.md:212
      and align with the rest of the surface. Caveat the mTLS-via-cert-manager
      claim if it is not actually wired; otherwise, just promote.

  - id: DOCS-A-009
    severity: MEDIUM
    summary: "cli-reference.md still surfaces `reality.*` config keys + `--reality` scope after ZR vocabulary lock"
    file: docs/cli-reference.md:507
    status: open
    rationale: |
      The user-facing vocabulary lock recorded in

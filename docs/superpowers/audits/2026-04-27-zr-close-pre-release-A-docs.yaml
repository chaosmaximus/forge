      verbatim with `curl http://localhost:8420/api` will hit connection
      refused unless they also set `FORGE_HTTP_ENABLED=true`. Either flip
      the default to `true` (operations decision, not a docs decision) or
      add a one-liner: "HTTP is opt-in via `FORGE_HTTP_ENABLED=true`;
      default transport is the Unix socket at `~/.forge/forge.sock`."
  - id: DOCS-A-018
    severity: LOW
    summary: "CLI reference describes `recall --layer identity`, but `identity` is not a Manas layer"
    file: docs/cli-reference.md:40
    status: open
    rationale: |
      cli-reference.md:40 says "Filter by Manas layer: `experience`,
      `declared`, `domain_dna`, `skill`, `perception`, `identity`." The
      8 layers (per README and getting-started.md:132) are: platform, tool,
      skill, domain_dna, experience, perception, declared, latent. "identity"
      is not a memory layer — it is a separate engine (Ahankara) sitting
      alongside the 8-layer Manas. Either remove `identity` from the
      layer-filter list, or document explicitly that the layer filter
      accepts the synthetic `identity` virtual layer that aggregates
      identity facets. api-reference.md:170 echoes the same wrong list
      ("`experience`, `declared`, `domain_dna`, `perception`, `identity`")
      with `skill` missing entirely. Pick one canonical list.
  - id: DOCS-A-019
    severity: LOW
    summary: "Cargo install command in README installs `forge-bench` silently as a third binary"
    file: README.md:41
    status: open
    rationale: |
      `cargo install --git URL forge-daemon forge-cli` resolves the
      `forge-daemon` package, which has TWO `[[bin]]` entries:
      `forge-daemon` and `forge-bench` (crates/daemon/Cargo.toml). Both
      install. Users see an unexplained `forge-bench` in `~/.cargo/bin/`
      and will reasonably wonder if it is part of the public surface. Two
      options: (a) gate `forge-bench` behind a `[features]` block so the
      default install ships only the daemon bin, or (b) add a one-liner in
      README right under the install command listing the three resulting
      binaries. Companion to DOCS-A-011.
  - id: DOCS-A-020
    severity: NIT
    summary: "agent-development.md gRPC URL form uses `grpc://` scheme — verify CLI accepts that scheme"
    file: docs/agent-development.md:81
    status: open
    rationale: |
      Line 81 advertises `--endpoint grpc://forge.forge.svc.cluster.local:8421`.
      The `--endpoint` flag passes through to `forge-next`'s endpoint
      resolver. If the resolver only supports `https://` / `http://`
      (because the CLI talks JSON-over-HTTP and gRPC is a separate
      transport), this is a misleading promise. The cli-reference.md:11
      example only shows `https://`. Either add a `grpc://` example to
      cli-reference (and verify the resolver code accepts it), or
      simplify agent-development to the supported transport. NIT because
      this is one example line; flag for verify in the next CLI-help
      regen.

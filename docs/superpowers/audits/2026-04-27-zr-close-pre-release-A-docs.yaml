  - id: DOCS-A-017
    severity: LOW
    summary: "README architecture diagram + getting-started use mixed `localhost:8420` vs `~/.forge/forge.sock` claims without clarifying default"
    file: README.md:63
    status: open
    rationale: |
      README:63 says "serves context via HTTP at `localhost:8420/api` when
      agents need it"; but the real default is the Unix socket
      (cli-reference.md:11: "Omit for local Unix socket"; operations.md
      treats HTTP as opt-in via `FORGE_HTTP_ENABLED=false` default at line

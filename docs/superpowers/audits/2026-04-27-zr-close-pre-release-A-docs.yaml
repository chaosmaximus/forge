      519 names "reality" in the scope-cascade prose; line 527 lists
      `reality` as a `--scope` value; and line 547 advertises `--reality R`
      on `config get-effective`. api-reference.md:1755 / :1798 carry the same
      "reality" surface in scoped-config docs. The CLI binary still ACCEPTS
      `--reality` (verified: `forge-next config get-effective --help` shows
      it), so this is not a runtime bug — but the vocabulary contract says
      docs should hide the legacy alias even while the underlying SQL table
      and Rust struct stay named "reality" (CHANGELOG §Deprecated, line
      83-85, explicitly defers the rename). Either (a) introduce the
      `--project` aliases on the CLI side and document those instead, or
      (b) note "(deprecated alias for project; will be removed in v1.0)"
      next to each `reality` mention in cli-reference.md and api-reference.md.
      As-is, a new user reading cli-reference top-to-bottom is taught the
      old vocabulary alongside the new.

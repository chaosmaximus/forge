  # ── HIGH ──────────────────────────────────────────────────────────────
  - id: DOCS-A-001
    severity: HIGH
    summary: "Docs reference a `forge` binary for secret scanning — no such binary exists"
    file: docs/getting-started.md:223
    status: open
    rationale: |
      The Security Scanning section instructs users to run `forge scan .` and
      `forge scan . --watch --interval 30`, and the Common Commands Reference
      table at line 248 again lists `forge scan .`. The release tree builds
      only four binaries: `forge-bench`, `forge-daemon`, `forge-hud`,
      `forge-next`. There is no top-level `forge` binary, and `forge-next`
      has no `scan` subcommand (verified against `forge-next --help`). Users
      following the Quick Start will hit `command not found: forge`. README's
      claim "Secret scanning — SHA256 fingerprints, never stores values"
      remains plausible (post_edit_check integrates the scanner), but the
      standalone CLI surface advertised in getting-started simply does not
      exist. Either implement `forge-next scan ...` or rewrite the section
      to point at `post-edit-check` / `pre-bash-check` (which do invoke the
      scanner) and remove the fake binary references.
  - id: DOCS-A-002
    severity: HIGH
    summary: "Memory types in README + getting-started.md (`fact`, `entity`, `skill`) do not exist in the MemoryType enum"
    file: docs/getting-started.md:86
    status: open
    rationale: |
      getting-started.md:86 says: "Forge organizes memories by type:
      `decision`, `lesson`, `pattern`, `fact`, `entity`, `skill`." The
      actual enum at `crates/core/src/types/memory.rs:7-16` is
      `Decision | Lesson | Pattern | Preference | Protocol`. Submitting
      `--type fact` or `--type entity` is rejected by the daemon's typed
      deserialiser. README at `## Manas: 8-Layer Memory` does not name the
      memory types, but the inline CLI examples in README's CLI Reference
      section show `--type decision` (correct). The cli-reference.md list
      ("decision, lesson, pattern, preference") matches the enum but omits
      `protocol`. api-reference.md correctly lists
      `decision, lesson, pattern, preference, protocol`. Net: getting-started
      is the worst offender — a brand-new user doing the first `remember`
      example will silently follow into `--type fact` which the help text
      doesn't even list. Update getting-started.md to the actual five-type
      enum and add `protocol` to cli-reference.md:37 and :63.
  - id: DOCS-A-003
    severity: HIGH
    summary: "API reference advertises wrong Unix socket filename (`daemon.sock`); actual is `forge.sock`"
    file: docs/api-reference.md:19
    status: open
    rationale: |
      api-reference.md:19 says: "The same JSON protocol works over the Unix
      domain socket at `~/.forge/daemon.sock`." The example at line 22
      reinforces it: `socat - UNIX-CONNECT:~/.forge/daemon.sock`. The actual
      socket path is `~/.forge/forge.sock` — see `crates/core/src/paths.rs:30`
      (`format!("{}/forge.sock", forge_dir())`) and confirmed by
      `getting-started.md:65` ("socket: /home/you/.forge/forge.sock") and the
      operations.md `FORGE_SOCKET` default at line 601. Anyone running the
      socat one-liner verbatim hits ENOENT. The wrong path also appears
      nowhere else in code or other docs — this is a pure api-reference
      typo. Fix to `forge.sock` in both places.
  - id: DOCS-A-004
    severity: HIGH
    summary: "security.md says gRPC is `(Planned)` but it is shipped"
    file: docs/security.md:212
    status: open
    rationale: |
      security.md §"Transport Security" §"gRPC (Planned)" reads: "Designed
      for in-cluster service-to-service communication / mTLS via cert-manager

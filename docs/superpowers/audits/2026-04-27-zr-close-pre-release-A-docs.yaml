  - id: DOCS-A-011
    severity: MEDIUM
    summary: "Quick-Start cargo install string is wrong / installs nothing"
    file: README.md:41
    status: open
    rationale: |
      `cargo install --git https://github.com/chaosmaximus/forge forge-daemon forge-cli`
      is shown in README:41 and getting-started.md:15 as the recommended
      install path. Cargo's behaviour with `--git URL <pkg> <pkg>` searches
      for crate manifests with those package NAMES — `forge-daemon` matches
      the daemon (Cargo.toml package = `forge-daemon`), and `forge-cli`
      matches the CLI crate (`forge-cli`). Cargo will then install the bin
      defined under each package's `[[bin]]`. The daemon installs
      `forge-daemon` + `forge-bench` (both bin targets in
      crates/daemon/Cargo.toml); the CLI crate installs `forge-next` (the
      `[[bin]] name = "forge-next"`). So users actually get THREE binaries
      including the unused `forge-bench`, but they DO get `forge-next` and
      `forge-daemon`. The line below in getting-started ("This builds
      `forge-daemon` and `forge-next`") is misleading because the cargo
      command names neither bin — it names crates. Also: there is no
      published crate at `chaosmaximus/forge` — this works only because of
      the path-derived workspace install. Document the bin extraction
      explicitly: "installs `forge-daemon`, `forge-bench` (from forge-daemon
      crate) and `forge-next` (from forge-cli crate)" so users know what
      they got.
  - id: DOCS-A-012
    severity: MEDIUM
    summary: "Marketplace.json claims `proactive perception` and `identity` features without surfacing their current state"
    file: .claude-plugin/marketplace.json:6
    status: open
    rationale: |
      marketplace.json:6 description: "8-layer memory, proactive perception,
      identity, guardrails." plugin.json:5 echoes the same. Both bullets are
      shipped (perception worker exists, identity facet engine exists),
      BUT the marketplace entry advertises "Auto-installs on first use"
      (plugin.json:5) — the plugin is NOT yet on the official marketplace
      per `docs/getting-started.md:301-304` ("Full marketplace publication
      lands in 2P-1b — until then use Option A [symlink-install]"). A user
      reading the marketplace.json description and then trying
      `/plugin marketplace install forge` will fail. Drop "Auto-installs on
      first use" from plugin.json description until the marketplace
      publication actually completes (per the deferred-release-stack note
      in `feedback_release_stack_deferred.md`), or add a note in the
      description that this is the local-clone-only release.

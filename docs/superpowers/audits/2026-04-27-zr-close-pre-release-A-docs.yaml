  - id: DOCS-A-014
    severity: MEDIUM
    summary: "Phase-2A-4d.2 references in CLI/API docs leak internal phase tags into user-facing surface"
    file: docs/cli-reference.md:769
    status: open
    rationale: |
      cli-reference.md:769 names the `observe` command "Phase 2A-4d.2:
      Observability API"; api-reference.md:2589-2591 calls `inspect`
      "Phase 2A-4d.2 observability API" with a pointer to an internal spec
      doc. Phase tags like "P3-3.11 W29" or "P3-4 Wave Z (Z7)" also leak
      from the Help output into the rendered CLI reference (e.g. cli-reference
      shows the strict-scope flag's description "Phase P3-3.11 W29:
      strict-scope is the new default..." once the help is regenerated).
      Internal phase labels are noise to external users and create a
      maintenance trap (every phase rename forces a docs sweep). Strip
      "Phase 2A-4d.2:" prefixes and link only to the user-facing operator
      docs (`docs/observability/`).

    status: open
  - id: LOW-5
    severity: LOW
    summary: |
      `team run --topology X` accepts any string. Doc says "star, mesh,
      or chain (default: mesh)". Daemon presumably defaults on unknown
      values; add a clap ValueEnum to fail fast on typos.
    file: crates/cli/src/main.rs
    line: 1351
    status: open
  - id: LOW-6
    severity: LOW
    summary: |
      `forge-next context-refresh --since X` passes `since` raw to the
      daemon (no relative-duration parsing) while `forge-next recall
      --since X` runs relative durations through a hand-rolled parser
      (see HIGH-4). The two `--since` flags accept different input
      languages — confusing for hook authors who copy-paste between
      them.
    file: crates/cli/src/main.rs
    line: 891
    status: open
  - id: LOW-7
    severity: LOW
    summary: |
      `forge-next agent-template create --identity-facets '{...}'` and
      `--config-overrides '{...}'` and `--knowledge-domains '{...}'` are
      `Option<String>` — caller must hand-format JSON. The handler does
      no validation and forwards the raw string. A malformed JSON blob
      gets a daemon-side error after a round-trip rather than a CLI
      parse error. Validate with `serde_json::from_str` before dispatch.
    file: crates/cli/src/commands/teams.rs
    line: 7
    status: open
  - id: LOW-8
    severity: LOW
    summary: |
      `forge-next subscribe` has no graceful-shutdown story documented.
      The clap doc-comment says it "streams NDJSON to stdout" but does
      not mention `^C`, EOF behavior, or what happens when the daemon
      restarts mid-stream. Operationally fine (Ctrl-C exits the
      tokio runtime), but a sentence in `--help` would help.
    file: crates/cli/src/main.rs
    line: 863
    status: open
  - id: LOW-9
    severity: LOW
    summary: |
      32 `Request::*` variants have no CLI surface. Most are intentionally
      bench/test-only by docstring (`ProbePhase`, `ComputeRecencyFactor`,
      `StepDispositionOnce`) or internal-storage (`StorePlatform`,
      `StoreTool`, `StorePerception`, `StoreEvaluation`,
      `RecordMeetingResponse`, `RecordAgentCost`, `ConsumePerceptions`,
      `IngestDeclared`, `FlipPreference`, `ReaffirmPreference`). Three
      look like genuine gaps for users: `UpdateAgentTemplate` (MED-5),
      `ListTeamTemplates` (MED-6), `Version` (HIGH-5). The remaining
      `BatchRecall`, `CrossEngineQuery`, `FileMemoryMap`, `GetGraphData`,
      `GetHudConfig`, `SetHudConfig`, `ExportHudConfig`, `RawIngest`,
      `RawSearch`, `RawDocumentsList`, `RoutingStats`, `BudgetStatus`,
      `ListDisposition`, `ListFlipped`, `ListToolCalls`,
      `ExtractWithProvider` are reachable today only via raw HTTP — pre-1.0
      decision: keep daemon-only or add CLI surface? Calling out for
      explicit triage rather than letting them drift.
    file: crates/cli/src/main.rs
    line: 0
    status: deferred
  - id: NIT-1
    severity: NIT
    summary: |
      `forge-next import` reads the entire NDJSON/JSON file into
      memory before sending to the daemon. The Request::Import shape
      is `data: String`. For users with multi-GB exports this OOMs the
      CLI process before the request leaves. Pre-1.0 acceptable;
      streaming-import is post-1.0 work. Filed for record.
    file: crates/cli/src/commands/system.rs
    line: 325
    status: deferred
  - id: NIT-2
    severity: NIT
    summary: |
      `restart` waits 6 seconds with `tokio::time::sleep` before health-
      checking the new daemon. Hard-coded magic number; the daemon's
      drain timeout is 5s, so this is "drain + 1s probe slack". Fine,
      but a brief comment explaining the constant would help future
      readers.
    file: crates/cli/src/main.rs
    line: 1955
    status: deferred

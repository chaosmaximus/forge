    severity: LOW
    summary: |
      `forge-next send --kind X` and `--respond --status X` accept any
      string. The protocol allows only `notification|request` (kind) and
      `accepted|rejected|completed|failed` (status); typos make the
      round-trip to the daemon and surface as opaque errors there.
      Convert to clap ValueEnum (same pattern as ValenceArg in W1.35).
    file: crates/cli/src/main.rs
    lines:
      - 439
